apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mail-network-policy
  namespace: mail-stack
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

  # =========================================================
  # FLUX ENTRANTS (INGRESS)
  # =========================================================
  ingress:
  # 1. Inter-communication totale entre pods du namespace
  - from:
    - podSelector: {}

  # 2. Trafic public entrant vers les services exposés
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - { protocol: TCP, port: 25 }
    - { protocol: TCP, port: 587 }
    - { protocol: TCP, port: 465 }
    - { protocol: TCP, port: 143 }
    - { protocol: TCP, port: 993 }
    - { protocol: TCP, port: 110 }
    - { protocol: TCP, port: 995 }
    - { protocol: TCP, port: 24 }
    - { protocol: TCP, port: 80 }
    - { protocol: TCP, port: 443 }
    - { protocol: TCP, port: 11334 }
    - { protocol: TCP, port: 10000 }

  # 3. Prometheus / Metrics depuis kube-system
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system

  # =========================================================
  # FLUX SORTANTS (EGRESS)
  # =========================================================
  egress:
  # 1. DNS EXPLICITE vers CoreDNS (10.96.0.10)
  #    Règle séparée et prioritaire -- sans except
  #    C'était le bug : le except 10.96.0.0/12 bloquait CoreDNS
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - { protocol: UDP, port: 53 }
    - { protocol: TCP, port: 53 }

  # 2. Communication interne namespace mail-stack
  - to:
    - podSelector: {}

  # 3. Longhorn (stockage NFS)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: longhorn-system
    ports:
    - { protocol: TCP, port: 2049 }

  # 4. cert-manager (renouvellement certificats)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cert-manager
    ports:
    - { protocol: TCP, port: 443 }

  # 5. kube-system (webhooks, API)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - { protocol: TCP, port: 443 }

  # 6. Internet uniquement -- LAN et plage cluster EXCLUS
  #    10.0.0.0/8 couvre : 10.96.0.0/12 (cluster) + 10.244.0.0/16 (pods)
  #    192.168.0.0/16 couvre le LAN physique
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.0.0.0/8
        - 192.168.0.0/16
    ports:
    - { protocol: TCP, port: 80 }
    - { protocol: TCP, port: 443 }
    - { protocol: TCP, port: 25 }
    - { protocol: TCP, port: 3310 }
