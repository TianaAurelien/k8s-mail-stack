apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mail-network-policy
  namespace: mail-stack
spec:
  podSelector: {} # S'applique à tous les pods du namespace
  policyTypes:
  - Ingress
  - Egress

  # =========================================================
  # FLUX ENTRANTS (INGRESS)
  # =========================================================
  ingress:
  # 1. Inter-communication totale entre pods du namespace
  - from:
    - podSelector: {}

  # 2. Trafic public entrant vers les services exposés
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - { protocol: TCP, port: 25 }
    - { protocol: TCP, port: 587 }
    - { protocol: TCP, port: 465 }
    - { protocol: TCP, port: 143 }
    - { protocol: TCP, port: 993 }
    - { protocol: TCP, port: 110 }
    - { protocol: TCP, port: 995 }
    - { protocol: TCP, port: 24 }
    - { protocol: TCP, port: 80 }
    - { protocol: TCP, port: 443 }
    - { protocol: TCP, port: 11334 }
    - { protocol: TCP, port: 10000 }

  # 3. Metrics / Prometheus
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system

  # =========================================================
  # FLUX SORTANTS (EGRESS)
  # =========================================================
  egress:
  # 1. DNS EXPLICITE
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - { protocol: UDP, port: 53 }
    - { protocol: TCP, port: 53 }

  # 2. Inter-communication interne
  - to:
    - podSelector: {}

  # 3. Longhorn
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: longhorn-system
    ports:
    - { protocol: TCP, port: 2049 }

  # 4. cert-manager
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cert-manager
    ports:
    - { protocol: TCP, port: 443 }

  # 5. kube-system (API)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - { protocol: TCP, port: 443 }

  # 6. ACCÈS AU RELAIS NAT (CORRECTION)
  # On autorise explicitement l'IP de k8s-nat-2
  - to:
    - ipBlock:
        cidr: 192.168.6.219/32
    ports:
    - { protocol: TCP, port: 25 }

  # 7. Internet (avec exclusion sécurisée)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.0.0.0/8
        # On ne bloque plus tout le 192.168.0.0/16 ici pour éviter les conflits
        # mais on garde la restriction sur les plages privées standards si nécessaire
    ports:
    - { protocol: TCP, port: 80 }
    - { protocol: TCP, port: 443 }
    - { protocol: TCP, port: 25 }
    - { protocol: TCP, port: 3310 }
