---
# MariaDB Galera Cluster 3 nodes - HA Robust Production
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-galera
  namespace: mail-stack
spec:
  serviceName: mariadb-galera
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mariadb-galera
  template:
    metadata:
      labels:
        app: mariadb-galera
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - mariadb-galera
            topologyKey: kubernetes.io/hostname
      
      initContainers:
      - name: init-config
        image: busybox
        command:
        - /bin/sh
        - -c
        - |
          set -ex
          cp /mnt/config-source/* /mnt/config/
          chown -R 999:999 /mnt/data /mnt/config
        volumeMounts:
        - name: config
          mountPath: /mnt/config
        - name: config-source
          mountPath: /mnt/config-source
        - name: data
          mountPath: /mnt/data
      
      containers:
      - name: mariadb
        image: mariadb:11.4
        command:
        - /bin/sh
        - -c
        - |
          set -ex
          DATADIR="/var/lib/mysql"
          # On définit tous les membres pour permettre la découverte mutuelle
          GCOMM="gcomm://mariadb-galera-0.mariadb-galera,mariadb-galera-1.mariadb-galera,mariadb-galera-2.mariadb-galera"

          # 1. Cas du PREMIER démarrage (Volume vierge)
          if [ ! -d "$DATADIR/mysql" ]; then
              if [ "$HOSTNAME" = "mariadb-galera-0" ]; then
                  echo "Fresh cluster: Initializing from pod 0..."
                  exec docker-entrypoint.sh mariadbd --wsrep-new-cluster --wsrep_cluster_address="gcomm://"
              else
                  echo "Fresh cluster: Waiting for pod 0..."
                  sleep 30
                  exec docker-entrypoint.sh mariadbd --wsrep_cluster_address="gcomm://mariadb-galera-0.mariadb-galera"
              fi
          fi

          # 2. Cas du REDÉMARRAGE (Cluster déjà existant)
          # On ne force PAS safe_to_bootstrap. On laisse les nœuds se synchroniser.
          echo "Restart detected: Attempting to join cluster via $GCOMM..."
          exec docker-entrypoint.sh mariadbd --wsrep_cluster_address="$GCOMM"
        ports:
        - containerPort: 3306
        - containerPort: 4567
        - containerPort: 4568
        - containerPort: 4444
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mail-secrets
              key: MYSQL_ROOT_PASSWORD
        - name: MYSQL_INITDB_SKIP_TZINFO
          value: "1"
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "mariadb-admin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
          initialDelaySeconds: 120
          periodSeconds: 20
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "mariadb-admin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"
          initialDelaySeconds: 45
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        - name: config
          mountPath: /etc/mysql/conf.d
        - name: init-db
          mountPath: /docker-entrypoint-initdb.d
      
      volumes:
      - name: config
        emptyDir: {}
      - name: config-source
        configMap:
          name: mariadb-galera-config
      - name: init-db
        configMap:
          name: mariadb-init-scripts
  
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: longhorn-mail
      resources:
        requests:
          storage: 10Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mariadb-galera-pdb
  namespace: mail-stack
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: mariadb-galera
