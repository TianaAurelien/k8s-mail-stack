apiVersion: v1
kind: ConfigMap
metadata:
  name: dovecot-config
  namespace: mail-stack
data:
  dovecot.conf: |
    # =========================
    # LOGS
    # =========================
    log_path = /dev/stdout
    info_log_path = /dev/stdout
    debug_log_path = /dev/stdout

    # =========================
    # SUPPORT HAPROXY
    # =========================
    haproxy_trusted_networks = 127.0.0.1, 10.244.0.0/16, 192.168.6.0/24
    haproxy_timeout = 3s

    # =========================
    # Protocoles
    # =========================
    protocols = imap pop3 lmtp
    listen = *
    disable_plaintext_auth = no
    auth_mechanisms = plain login

    mail_location = maildir:/var/mail/%d/%n
    mail_plugins = $mail_plugins quota
    
    protocol imap {
      mail_plugins = $mail_plugins imap_quota
    }
    
    protocol lmtp {
      mail_plugins = $mail_plugins quota
    }

    plugin {
      quota = count:User quota
      quota_vsizes = yes
      quota_rule = *:storage=10G
      quota_exceeded_message = Boite mail pleine.
    }

    passdb {
      driver = sql
      args = /etc/dovecot/dovecot-sql.conf.ext
    }
    
    userdb {
      driver = sql
      args = /etc/dovecot/dovecot-sql.conf.ext
    }

    ssl = yes
    ssl_cert = </etc/dovecot/ssl/tls.crt
    ssl_key = </etc/dovecot/ssl/tls.key

    # =========================
    # SERVICES AVEC PROXY PROTOCOL
    # =========================
    service imap-login {
      inet_listener imap {
        port = 143
        haproxy = yes
      }
      inet_listener imaps {
        port = 993
        haproxy = yes
      }
    }

    service pop3-login {
      inet_listener pop3 {
        port = 110
        haproxy = yes
      }
      inet_listener pop3s {
        port = 995
        haproxy = yes
      }
    }

    service lmtp {
      inet_listener lmtp {
        address = *
        port = 24
      }
    }

    service auth {
      unix_listener auth-userdb {
        mode = 0666
      }
      inet_listener auth-sasl {
        port = 10000
      }
    }

  dovecot-sql.conf.ext: |
    driver = mysql
    connect = dbname=mailserver host=mariadb-service.mail-stack.svc.cluster.local user=mailuser password=__DB_PASSWORD__
    default_pass_scheme = SHA512-CRYPT
    password_query = SELECT email AS user, password AS password FROM virtual_users WHERE email='%u';
    user_query = SELECT '/var/mail/%d/%n' AS home, 1000 AS uid, 1000 AS gid FROM virtual_users WHERE email='%u' AND enabled=1;
