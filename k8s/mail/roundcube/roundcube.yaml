apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: mail-stack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - roundcube
              topologyKey: kubernetes.io/hostname
      containers:
      - name: roundcube
        image: roundcube/roundcubemail:1.6.7-apache
        ports:
        - containerPort: 80
        # Charge toutes les variables du ConfigMap
        envFrom:
        - configMapRef:
            name: roundcube-config
        env:
        # On surcharge ou on ajoute uniquement le mot de passe sensible via le Secret
        - name: ROUNDCUBEMAIL_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mail-secrets
              key: MYSQL_PASSWORD
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /index.php
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /index.php
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube-service
  namespace: mail-stack
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.6.223
  sessionAffinity: ClientIP
  selector:
    app: roundcube
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: roundcube-pdb
  namespace: mail-stack
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: roundcube
