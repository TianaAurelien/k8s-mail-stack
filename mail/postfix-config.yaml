apiVersion: v1
kind: ConfigMap
metadata:
  name: postfix-config
  namespace: mail-stack
data:
  main.cf: |
    compatibility_level = 3.6
    maillog_file = /dev/stdout

    myhostname = mail.k8s.malagasy.com
    mydomain = k8s.malagasy.com
    myorigin = $mydomain

    inet_interfaces = all
    inet_protocols = ipv4

    mydestination = localhost
    local_recipient_maps =

    mynetworks = 127.0.0.0/8, 10.0.0.0/8, 10.244.0.0/16, 192.168.6.0/24

    smtp_host_lookup = native, dns
    lmtp_host_lookup = native, dns

    virtual_mailbox_domains = proxy:mysql:/etc/postfix/mysql-virtual-mailbox-domains.cf
    virtual_mailbox_maps = proxy:mysql:/etc/postfix/mysql-virtual-mailbox-maps.cf
    virtual_alias_maps = proxy:mysql:/etc/postfix/mysql-virtual-alias-maps.cf

    virtual_transport = lmtp:inet:dovecot-service.mail-stack.svc.cluster.local:24

    smtpd_sasl_type = dovecot
    smtpd_sasl_path = inet:dovecot-service.mail-stack.svc.cluster.local:10000
    smtpd_sasl_auth_enable = yes
    smtpd_sasl_security_options = noanonymous
    smtpd_sasl_authenticated_header = yes
    broken_sasl_auth_clients = yes

    smtpd_tls_security_level = may
    smtpd_tls_cert_file = /etc/postfix/tls.crt
    smtpd_tls_key_file = /etc/postfix/tls.key
    smtpd_tls_loglevel = 1

    smtpd_milters = inet:rspamd-service.mail-stack.svc.cluster.local:11332
    non_smtpd_milters = inet:rspamd-service.mail-stack.svc.cluster.local:11332
    milter_protocol = 6
    milter_default_action = accept
    milter_connect_timeout = 5s

    smtpd_relay_restrictions = permit_mynetworks, permit_sasl_authenticated, reject_unauth_destination
    smtpd_recipient_restrictions = permit_mynetworks, permit_sasl_authenticated, reject_unauth_destination

  master.cf: |
    # Service SMTP entrant (port 25) - MTA to MTA
    smtp      inet  n       -       n       -       -       smtpd

    # Submission (port 587) - Clients authentifiés avec STARTTLS
    submission inet n       -       n       -       -       smtpd
      -o syslog_name=postfix/submission
      -o smtpd_tls_security_level=encrypt
      -o smtpd_sasl_auth_enable=yes
      -o smtpd_sasl_type=dovecot
      -o smtpd_sasl_path=inet:dovecot-service.mail-stack.svc.cluster.local:10000
      -o smtpd_relay_restrictions=permit_sasl_authenticated,reject
      -o smtpd_recipient_restrictions=permit_sasl_authenticated,reject

    # SMTPS (port 465) - TLS wrapper mode
    smtps     inet  n       -       n       -       -       smtpd
      -o syslog_name=postfix/smtps
      -o smtpd_tls_wrappermode=yes
      -o smtpd_sasl_auth_enable=yes
      -o smtpd_sasl_type=dovecot
      -o smtpd_sasl_path=inet:dovecot-service.mail-stack.svc.cluster.local:10000
      -o smtpd_relay_restrictions=permit_sasl_authenticated,reject
      -o smtpd_recipient_restrictions=permit_sasl_authenticated,reject

    pickup    unix  n       -       n       60      1       pickup
    cleanup   unix  n       -       n       -       0       cleanup
    qmgr      unix  n       -       n       300     1       qmgr
    tlsmgr    unix  -       -       n       1000    1       tlsmgr
    rewrite   unix  -       -       n       -       -       trivial-rewrite
    bounce    unix  -       -       n       -       0       bounce
    defer     unix  -       -       n       -       0       bounce
    proxymap  unix  -       -       n       -       -       proxymap
    proxywrite unix -       -       n       -       1       proxymap
    smtp      unix  -       -       n       -       -       smtp
    relay     unix  -       -       n       -       -       smtp
    showq     unix  n       -       n       -       -       showq
    error     unix  -       -       n       -       -       error
    retry     unix  -       -       n       -       -       error
    discard   unix  -       -       n       -       -       discard
    local     unix  -       n       n       -       -       local
    virtual   unix  -       n       n       -       -       virtual
    lmtp      unix  -       -       n       -       -       lmtp
    anvil     unix  -       -       n       -       1       anvil
    scache    unix  -       -       n       -       1       scache
    postlog   unix-dgram n  -       n       -       1       postlogd

  mysql-virtual-mailbox-domains.cf: |
    user = mailuser
    password = __DB_PASSWORD__
    hosts = mariadb-service.mail-stack.svc.cluster.local
    dbname = mailserver
    query = SELECT 1 FROM virtual_domains WHERE name='%s'

  mysql-virtual-mailbox-maps.cf: |
    user = mailuser
    password = __DB_PASSWORD__
    hosts = mariadb-service.mail-stack.svc.cluster.local
    dbname = mailserver
    query = SELECT 1 FROM virtual_users WHERE email='%s' AND enabled=1

  mysql-virtual-alias-maps.cf: |
    user = mailuser
    password = __DB_PASSWORD__
    hosts = mariadb-service.mail-stack.svc.cluster.local
    dbname = mailserver
    query = SELECT destination FROM virtual_aliases WHERE source='%s'
